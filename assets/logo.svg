<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="SelfRepair">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background disc -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#brand)" stroke-width="2" opacity="0.4"/>

  <!-- Outer dashed orbit -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#06B6D4" stroke-width="1"
          opacity="0.25" stroke-dasharray="6 14"/>

  <!-- Repair loop: open ring + arrowhead -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="170" fill="none" stroke="url(#brand)" stroke-width="14"
            stroke-dasharray="840 200" stroke-linecap="round" transform="rotate(-90 256 256)"/>
    <polygon points="410,240 436,256 410,272" fill="#10B981"/>
  </g>

  <!-- Inner core -->
  <circle cx="256" cy="256" r="120" fill="#0A0E27" opacity="0.85"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#brand)" stroke-width="2" opacity="0.4"/>

  <!-- Checkmark -->
  <polyline points="200,260 240,300 320,210" fill="none" stroke="url(#check)"
            stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Orbital indicators (the four pillars) -->
  <circle cx="256" cy="56"  r="7" fill="#10B981"/>
  <circle cx="456" cy="256" r="6" fill="#06B6D4"/>
  <circle cx="256" cy="456" r="7" fill="#3B82F6"/>
  <circle cx="56"  cy="256" r="6" fill="#22D3EE"/>
</svg>
