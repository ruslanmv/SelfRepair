<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f260;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0575e6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#shield)" stroke-width="2" opacity="0.4"/>
  <!-- Shield body -->
  <path d="M256 80 L380 140 L380 280 C380 360 320 420 256 440 C192 420 132 360 132 280 L132 140 Z" 
        fill="none" stroke="url(#shield)" stroke-width="8" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M256 100 L365 152 L365 278 C365 348 312 402 256 420 C200 402 147 348 147 278 L147 152 Z" 
        fill="url(#bg)" opacity="0.8"/>
  <!-- Inner shield highlight -->
  <path d="M256 120 L350 165 L350 275 C350 338 302 386 256 402 C210 386 162 338 162 275 L162 165 Z" 
        fill="none" stroke="url(#shield)" stroke-width="1.5" opacity="0.3"/>
  <!-- Checkmark -->
  <path d="M200 260 L240 300 L320 210" 
        fill="none" stroke="url(#check)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Scanning lines -->
  <line x1="180" y1="190" x2="260" y2="190" stroke="#00d2ff" stroke-width="2" opacity="0.3"/>
  <line x1="190" y1="210" x2="280" y2="210" stroke="#00d2ff" stroke-width="2" opacity="0.2"/>
  <line x1="195" y1="330" x2="270" y2="330" stroke="#00d2ff" stroke-width="2" opacity="0.2"/>
  <line x1="185" y1="350" x2="250" y2="350" stroke="#00d2ff" stroke-width="2" opacity="0.3"/>
  <!-- Orbit dots -->
  <circle cx="256" cy="56" r="6" fill="#00d2ff" opacity="0.6"/>
  <circle cx="440" cy="256" r="5" fill="#3a7bd5" opacity="0.5"/>
  <circle cx="72" cy="256" r="5" fill="#3a7bd5" opacity="0.5"/>
  <circle cx="256" cy="456" r="6" fill="#00d2ff" opacity="0.6"/>
  <!-- Orbital ring -->
  <ellipse cx="256" cy="256" rx="220" ry="220" fill="none" stroke="#00d2ff" stroke-width="0.8" opacity="0.15" stroke-dasharray="8 12"/>
</svg>
