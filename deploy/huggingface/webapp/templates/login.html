{% extends "base.html" %}
{% block title %}Sign In - RepoGuardian{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your RepoGuardian account</p>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label" for="username">Username or Email</label>
                <input class="form-input" type="text" id="username" name="username" required autofocus placeholder="admin">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Sign In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
