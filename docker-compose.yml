version: "3.9"

services:
  selfrepair-backend:
    build: .
    container_name: selfrepair-backend
    ports:
      - "8000:8000"
    environment:
      DRY_RUN: "true"
      LOG_LEVEL: "INFO"
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000

  optional-dashboard:
    build:
      context: ./deploy/huggingface
    container_name: selfrepair-dashboard
    ports:
      - "7860:7860"

