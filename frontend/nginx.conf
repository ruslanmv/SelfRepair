# SPA fallback + API proxy. Listens on 8080 so the container can run as
# non-root in production (nginx unprivileged image is also an option).
server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Aggressively cache hashed assets but never the index.html shell.
  location ~* \.(js|css|woff2?|svg|png|jpg|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # Proxy /api/* to the FastAPI backend. SELFREPAIR_API_URL is templated in
  # at container start by an entrypoint or set in the deployment env.
  location /api/ {
    proxy_pass http://selfrepair-api:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;             # SSE streams need this off
    proxy_read_timeout 3600s;        # long jobs and live event streams
  }

  # SPA routes — fall through to index.html so React Router (or our hash-router) handles them.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Health probe for k8s.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # Hide the nginx version and tighten headers.
  server_tokens off;
  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";
  add_header Referrer-Policy "strict-origin-when-cross-origin";
}
