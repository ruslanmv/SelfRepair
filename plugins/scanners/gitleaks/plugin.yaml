kind: scanner
id: gitleaks
version: "8.18.0"

inputs:
  - workspace_path
outputs:
  - findings.sarif

# Gitleaks ships its rules with the binary; no network needed.
runtime:
  image: "zricethezav/gitleaks:v8.18.0"
  cmd:
    - "gitleaks"
    - "detect"
    - "--no-git"
    - "--source=/in"
    - "--report-format=sarif"
    - "--report-path=/out/findings.sarif"
    - "--exit-code=0"
  network: none
  cpu: "0.5"
  memory: "1Gi"
  timeout: 180
