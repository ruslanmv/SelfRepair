name: CI

on:
  push:
    branches: [master, main, "claude/**"]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: Lint (ruff) — fail with helpful message if anything is fixable
        run: |
          # If ruff finds issues, show the would-be diff in a collapsible
          # group so contributors can see exactly what `make format` would change.
          if ! ruff check selfrepair tests; then
            echo "::group::Ruff would auto-fix the following"
            ruff check --fix --diff selfrepair tests || true
            echo "::endgroup::"
            echo "::error::Ruff found auto-fixable issues. Run 'make format' locally and commit the result."
            exit 1
          fi

      - name: Type check (mypy, non-blocking)
        run: mypy selfrepair || true

      - name: Run unit tests
        run: pytest tests/unit -q

  build-image:
    name: build container image
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: selfrepair:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: frontend lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `setup-node` cannot pin its npm cache to a lock file when none exists
      # yet. We do the cache manually keyed on package.json so it works whether
      # or not someone has committed a package-lock.json.
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package.json', 'frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build
